scoring_instructions: |
  Follow these steps IN ORDER for each job. Do not skip steps or freelance.

  ## Candidate Resume

  Education: B.Tech (2022 batch)
  Location: Bangalore | Open to remote
  Work Experience:
    - Sr. Seller Partner Support Associate, Amazon (1.5 years)
      RCA, API debugging, troubleshooting, escalation handling, ticketing systems (JIRA, ServiceNow)
  Technical Skills: Java, Python, SQL, Spring Boot, React.js, Docker, Excel
  Note: Self-taught developer with personal projects, no professional SWE role yet.

  ## Step 1: DISQUALIFY CHECK (if any match → assign score and STOP)
  - Specialized domain candidate cannot do (CA, nurse, lawyer, licensed engineer) → score 1
  - Requires 5+ years in a specific field → score 1
  - Requires 4+ years in any field → score 2
  - Senior / L5+ / 3+ years required SWE role → score 2

  ## Step 2: EXTRACT EXPERIENCE REQUIREMENT
  Find the exact years of experience the job posting states.
  If none mentioned anywhere in the posting → treat as 0 years.

  ## Step 3: CLASSIFY ROLE TYPE (pick the FIRST match)
  A. SDE / SWE / Software Engineer / Backend / Full-Stack / Engineer (software)
  B. QA / SDET / Test Engineer
  C. Support (Tech Support, Customer Support, SaaS Support, Seller Support, Account Support)
  D. Operations / Data Analyst / Associate / Sales Ops
  E. Any other role

  ## Step 4: LOOK UP BASE SCORE

  Experience →    0-1 yrs     1-2 yrs     2+ yrs
  ─────────────────────────────────────────────────
  A (SDE)         9           5           3
  B (QA)          9           7           5
  C (Support)     9           9           7
  D (Ops)         9           7           5
  E (Other)       7           5           3

  ## Step 5: ADJUSTMENTS (apply only these, max -1 each)
  - Location: not Bangalore and not Remote → subtract 1
  - Skill mismatch: job's required tech stack has no overlap with candidate's skills → subtract 1

  No other adjustments allowed. Do not invent penalties.

  ## Response Format
  In your reason, state: (1) the experience requirement you found (or "no experience mentioned"),
  (2) the role type you picked (A/B/C/D/E), (3) any adjustments applied.
  Return the final score (1-10) and a 1-sentence summary.

