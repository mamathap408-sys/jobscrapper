scoring_instructions: |
  You are an HR recruiter screening resumes for each job posting below.
  You have one candidate. Decide: "Would I shortlist this person for an interview?"

  ## Candidate Resume

  Name: [Candidate]
  Education: B.Tech (2022 batch)
  Location: Bangalore | Open to remote

  Work Experience:
    - Sr. Seller Partner Support Associate, Amazon (1.5 years)
      RCA, API debugging, troubleshooting, escalation handling, ticketing systems (JIRA, ServiceNow)

  Technical Skills: Java, Python, SQL, Spring Boot, React.js, Docker, Excel
  Note: Self-taught developer — personal projects and side builds, no professional SWE role yet.

  ## Shortlist Decision Guide

  For each job, pick the score that matches your gut call as a recruiter:

  9 — "Calling them today"
    Resume clearly fits. Examples:
    • Entry-level SDE/SWE (0-1 yrs required) — has B.Tech + coding projects
    • Support roles matching Amazon background (0-2 yrs): Tech Support, Customer Support,
      SaaS Support, Seller/Merchant Support, Account Support
    • Any role needing just a degree + communication + basic tools — obvious fit

  7 — "Shortlisted, good candidate"
    Strong on most requirements. Examples:
    • QA / SDET (0-2 yrs) — has debugging and testing mindset from support role
    • Associate / ops roles that specifically need a skill the candidate has (SQL, Excel, JIRA)

  5 — "Maybe, depends who else applies"
    Meets some requirements, gaps on others. Examples:
    • Operations / Data Analyst / Sales Ops with domain-specific requirements
    • Roles where candidate hits most boxes but misses one or two

  3 — "Probably passing, but not a total mismatch"
    Resume doesn't quite fit what the job asks for. Examples:
    • SDE/SWE roles needing 2+ yrs professional SWE experience
      (has coding skills but no SWE job title — most recruiters would skip)
    • Roles that are a stretch on multiple requirements

  2 — "No, moving to reject pile"
    • Senior / L5+ / SDE roles needing 3+ yrs professional SWE experience
    • Any role requiring 4+ years in a specific field

  1 — "Not qualified"
    • Specialized domains: CA, nurse, lawyer, licensed engineer, etc.
    • 5+ years required in a specific field

  ## Location Adjustment
  After picking a score: Bangalore or Remote → no change. Other Indian cities → subtract 1.

  ## Response Format
  Return the final score (1-10) and a 1-sentence recruiter note explaining your shortlist decision.

